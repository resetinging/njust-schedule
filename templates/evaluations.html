{% extends "base.html" %}
{% block title %}教学评价 - 南理工课表管理{% endblock %}
{% block nav_evaluations %}active{% endblock %}

{% block content %}
<div class="page-header">
    <div class="header-left">
        <h1>📝 教学评价</h1>
        <span class="semester-badge" id="semester-badge">加载中...</span>
    </div>
    <div class="header-actions">
        <button class="btn btn-primary" onclick="refreshEvaluations()" id="btn-refresh">
            🔄 刷新评价数据
        </button>
    </div>
</div>


<!-- 倒计时卡片 -->
<div class="countdown-row" id="countdown-row" style="display:none;"></div>

<!-- 评价列表 -->
<div class="schedule-empty" id="eval-empty" style="display:none;">
    <div class="empty-icon">📋</div>
    <h3>暂无评价数据</h3>
    <p id="empty-eval-message">请先登录教务系统，然后点击「刷新评价数据」</p>
    <button class="btn btn-primary" onclick="window.location.href='/settings'">前往设置</button>
</div>

<div class="exam-list" id="eval-list"></div>

<!-- 评教模态窗口 -->
<div class="eval-modal-overlay" id="eval-modal" style="display:none;">
    <div class="eval-modal">
        <div class="eval-modal-header">
            <span id="eval-modal-title">评教</span>
            <button class="eval-modal-close" onclick="closeEvalModal()">✕</button>
        </div>
        <div class="eval-modal-body" id="eval-modal-body">
            <!-- 批量评教进度（默认隐藏） -->
            <div class="batch-progress" id="batch-progress" style="display:none;">
                <div class="batch-progress-header">
                    <h3>🚀 一键评教进行中...</h3>
                    <span class="batch-progress-count" id="batch-progress-count"></span>
                </div>
                <div class="batch-progress-bar">
                    <div class="batch-progress-fill" id="batch-progress-fill"></div>
                </div>
                <p class="batch-progress-status" id="batch-progress-status"></p>
                <div class="batch-progress-results" id="batch-progress-results"></div>
                <div class="batch-progress-actions" id="batch-progress-actions" style="display:none;">
                    <button class="btn btn-primary" onclick="refreshCourseList()">
                        ✅ 完成，返回课程列表
                    </button>
                </div>
            </div>
            <!-- 普通内容区 -->
            <div id="eval-modal-content"></div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script src="/static/js/evaluations.js"></script>
{% endblock %}
